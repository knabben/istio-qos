apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: podlabeler-debug-reader
rules:
- apiGroups: [""]
  resources: ["pods", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["labeling.knabben.dev"]
  resources: ["podlabelerpolicies"]
  verbs: ["get", "list", "watch"]
