name: kmcp-server Python tests

on:
  push:
    paths:
      - "kmcp-server/**"
  pull_request:
    paths:
      - "kmcp-server/**"

jobs:
  test:
    name: Python unit tests (no live cluster)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: kmcp-server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: kmcp-server
        run: pytest tests/ -v --tb=short
