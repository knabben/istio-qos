# This rule is not used by the project istio-qos itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to mesh.knabben.github.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: istio-qos
    app.kubernetes.io/managed-by: kustomize
  name: podlabelerpolicy-viewer-role
rules:
- apiGroups:
  - mesh.knabben.github.com
  resources:
  - podlabelerpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mesh.knabben.github.com
  resources:
  - podlabelerpolicies/status
  verbs:
  - get
