# This rule is not used by the project istio-qos itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the mesh.knabben.github.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: istio-qos
    app.kubernetes.io/managed-by: kustomize
  name: podlabelerpolicy-editor-role
rules:
- apiGroups:
  - mesh.knabben.github.com
  resources:
  - podlabelerpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mesh.knabben.github.com
  resources:
  - podlabelerpolicies/status
  verbs:
  - get
