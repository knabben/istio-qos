---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - patch
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - mesh.knabben.github.com
  resources:
  - podlabelerpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - mesh.knabben.github.com
  resources:
  - podlabelerpolicies/status
  verbs:
  - patch
  - update
